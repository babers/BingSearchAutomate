urls:
  # Microsoft Rewards points page
  rewards: https://rewards.bing.com/pointsbreakdown
  # Search landing page used for automated searches
  search: https://www.bing.com/news/?form=ml11z9&crea=ml11z9&wt.mc_id=ml11z9&rnoreward=1&rnoreward=1

xpaths:
  # Primary points element locator
  points: 
    //*[@id="userPointsBreakdown"]/div/div[2]/div/div[1]/div/div[2]/mee-rewards-user-points-details/div/div/div/div/p[2]

selectors:
  # Bing search input field name attribute
  search_box_name: q

paths:
  # Runtime file names (resolved into AppData when packaged)
  database: searches.db
  log_file: app.log

search_settings:
  # Session target points
  target_points: 90
  # Consecutive no-gain searches before pause
  searches_before_pause: 10
  # Base adaptive pause duration
  pause_duration_minutes: 1.0
  # Human-like sleep range between searches
  min_sleep_seconds: 15
  max_sleep_seconds: 20
  # Watcher polling interval
  poll_interval: 5
  # Topic strategy: runtime | daily
  topic_generator: runtime

browser:
  # True = headless browser; False = visible browser
  headless: true
  # Playwright slow motion in milliseconds
  slow_mo_ms: 0
  # Session persistence state file
  storage_state_path: storage_state.json
  # Installed browser channel
  channel: msedge

proxy:
  # Enable proxy rotation
  enabled: false
  # random | round_robin | sequential
  rotation_strategy: random
  # Add one proxy per item
  proxies: []

stealth:
  # Human-like behavior options
  simulate_mistakes: true
  mistake_probability: 0.05
  typing_speed_variance: true
  random_mouse_movements: true
  random_scrolling: true

logging:
  # DEBUG | INFO | WARNING | ERROR | CRITICAL
  level: ERROR
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'

# Optional startup profiles
# Usage: python main.py --profile stealth_mode
profiles:
  stealth_mode:
    search_settings:
      searches_before_pause: 5
      pause_duration_minutes: 2
      min_sleep_seconds: 20
      max_sleep_seconds: 40
    stealth:
      simulate_mistakes: true
      mistake_probability: 0.08
      typing_speed_variance: true
      random_mouse_movements: true
    browser:
      slow_mo_ms: 100
  balanced_mode:
    search_settings:
      searches_before_pause: 10
      pause_duration_minutes: 1
      min_sleep_seconds: 15
      max_sleep_seconds: 20
    stealth:
      simulate_mistakes: true
      mistake_probability: 0.05
      typing_speed_variance: true
      random_mouse_movements: true
    browser:
      slow_mo_ms: 0
  speed_mode:
    search_settings:
      searches_before_pause: 15
      pause_duration_minutes: 1
      min_sleep_seconds: 5
      max_sleep_seconds: 10
    stealth:
      simulate_mistakes: false
      mistake_probability: 0.0
      typing_speed_variance: false
      random_mouse_movements: false
    browser:
      slow_mo_ms: 0
active_profile:
